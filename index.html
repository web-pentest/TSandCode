<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSandCode — песочница кода</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c10;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .toolbar {
            background: #131720;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2c313c;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.7rem;
            color: #6c727f;
        }
        .github-link {
            background: #0f1217;
            padding: 6px 14px;
            border-radius: 40px;
            text-decoration: none;
            color: #b0b0b0;
            border: 1px solid #2c313c;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .github-link:hover {
            background: #2c313c;
            color: white;
        }
        .run-btn {
            background: #b0b0b0;
            color: #0a0c10;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .run-btn:hover {
            background: #ffffff;
            transform: scale(1.02);
        }
        .editor-container {
            display: flex;
            flex: 1;
            gap: 1px;
            background: #2c313c;
        }
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1e26;
        }
        .panel-header {
            background: #131720;
            padding: 8px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            border-bottom: 1px solid #2c313c;
        }
        textarea {
            flex: 1;
            background: #1a1e26;
            color: #e0e0e0;
            border: none;
            padding: 12px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1e26;
        }
        iframe {
            flex: 1;
            border: none;
            background: white;
        }
        footer {
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            color: #6c727f;
            border-top: 1px solid #2c313c;
            background: #131720;
        }
        @media (max-width: 800px) {
            .editor-container {
                flex-direction: column;
            }
            .editor-panel {
                height: 25vh;
            }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <div class="logo">
        <h1>⚡ TSandCode</h1>
        <p>песочница кода — html / css / js</p>
    </div>
    <div>
        <a href="https://github.com/web-pentest" target="_blank" class="github-link">🐙 web-pentest</a>
        <button class="run-btn" id="runBtn">▶ Запустить</button>
    </div>
</div>
<div class="editor-container">
    <div class="editor-panel">
        <div class="panel-header">📄 HTML</div>
        <textarea id="htmlCode" placeholder="<h1>Привет, мир!</h1>"></textarea>
    </div>
    <div class="editor-panel">
        <div class="panel-header">🎨 CSS</div>
        <textarea id="cssCode" placeholder="body { background: #f0f0f0; }"></textarea>
    </div>
    <div class="editor-panel">
        <div class="panel-header">⚡ JavaScript</div>
        <textarea id="jsCode" placeholder="console.log('Привет!');"></textarea>
    </div>
    <div class="output-panel">
        <div class="panel-header">🖥️ Результат</div>
        <iframe id="output"></iframe>
    </div>
</div>
<footer>
    🔥 TSandCode — создай свой код прямо в браузере | 🐙 <a href="https://github.com/web-pentest" target="_blank" style="color:#b0b0b0;">github.com/web-pentest</a>
</footer>

<script>
    const htmlEditor = document.getElementById('htmlCode');
    const cssEditor = document.getElementById('cssCode');
    const jsEditor = document.getElementById('jsCode');
    const output = document.getElementById('output');
    const runBtn = document.getElementById('runBtn');

    function saveCode() {
        localStorage.setItem('tsandcode_html', htmlEditor.value);
        localStorage.setItem('tsandcode_css', cssEditor.value);
        localStorage.setItem('tsandcode_js', jsEditor.value);
    }

    function loadCode() {
        htmlEditor.value = localStorage.getItem('tsandcode_html') || '<h1>✨ Добро пожаловать в TSandCode!</h1>\n<p>Пиши код в левых панелях →</p>';
        cssEditor.value = localStorage.getItem('tsandcode_css') || 'body { font-family: system-ui; padding: 20px; }\nh1 { color: #b0b0b0; }';
        jsEditor.value = localStorage.getItem('tsandcode_js') || 'console.log("TSandCode готов к работе!");\ndocument.querySelector("h1").style.color = "#89b4fa";';
    }

    function run() {
        const html = htmlEditor.value;
        const css = cssEditor.value;
        const js = jsEditor.value;
        const fullDoc = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>${css}</style>
</head>
<body>
    ${html}
    <script>${js}<\/script>
</body>
</html>`;
        const blob = new Blob([fullDoc], { type: 'text/html' });
        output.src = URL.createObjectURL(blob);
        saveCode();
    }

    let timeout;
    function autoRun() {
        clearTimeout(timeout);
        timeout = setTimeout(run, 500);
    }
    
    htmlEditor.addEventListener('input', autoRun);
    cssEditor.addEventListener('input', autoRun);
    jsEditor.addEventListener('input', autoRun);
    runBtn.addEventListener('click', run);
    
    loadCode();
    run();
</script>
</body>
</html>
