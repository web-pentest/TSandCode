<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSandCode — умная песочница кода</title>
    <!-- Подсветка синтаксиса CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c10;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .toolbar {
            background: #131720;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid #2c313c;
        }
        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.65rem;
            color: #6c727f;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        select, button {
            background: #0f1217;
            border: 1px solid #2c313c;
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
        }
        button {
            background: #b0b0b0;
            color: #0a0c10;
            font-weight: bold;
            border: none;
        }
        button:hover {
            background: #ffffff;
        }
        .github-link {
            background: #0f1217;
            padding: 6px 14px;
            border-radius: 40px;
            text-decoration: none;
            color: #b0b0b0;
            border: 1px solid #2c313c;
            font-size: 0.8rem;
        }
        .editor-container {
            flex: 1;
            display: flex;
            gap: 1px;
            background: #2c313c;
            overflow: hidden;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1e26;
            overflow: hidden;
        }
        .panel-header {
            background: #131720;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            border-bottom: 1px solid #2c313c;
        }
        .CodeMirror {
            height: 100% !important;
            font-size: 13px;
        }
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1e26;
        }
        iframe {
            flex: 1;
            border: none;
            background: white;
        }
        footer {
            text-align: center;
            padding: 6px;
            font-size: 0.65rem;
            color: #6c727f;
            border-top: 1px solid #2c313c;
            background: #131720;
        }
        @media (max-width: 800px) {
            .editor-container {
                flex-direction: column;
            }
            .panel {
                height: 30vh;
            }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <div class="logo">
        <h1>⚡ TSandCode</h1>
        <p>песочница кода — html / css / js</p>
    </div>
    <div class="controls">
        <select id="modeSelect">
            <option value="split">Раздельный режим (HTML/CSS/JS)</option>
            <option value="unified">Единый режим (всё в одном окне)</option>
        </select>
        <button id="runBtn">▶ Запустить</button>
        <a href="https://github.com/web-pentest" target="_blank" class="github-link">🐙 web-pentest</a>
    </div>
</div>
<div id="editorContainer" class="editor-container"></div>
<footer>
    🔥 TSandCode — создай свой код прямо в браузере | 🐙 <a href="https://github.com/web-pentest" target="_blank" style="color:#b0b0b0;">github.com/web-pentest</a>
</footer>

<script>
    // Состояние
    let currentMode = 'split';
    let editors = {};
    let unifiedEditor = null;
    
    // DOM
    const container = document.getElementById('editorContainer');
    const modeSelect = document.getElementById('modeSelect');
    const runBtn = document.getElementById('runBtn');
    
    // Загрузка/сохранение
    function saveCode() {
        if (currentMode === 'split') {
            localStorage.setItem('tsandcode_html', editors.html?.getValue() || '');
            localStorage.setItem('tsandcode_css', editors.css?.getValue() || '');
            localStorage.setItem('tsandcode_js', editors.js?.getValue() || '');
        } else {
            localStorage.setItem('tsandcode_unified', unifiedEditor?.getValue() || '');
        }
        localStorage.setItem('tsandcode_mode', currentMode);
    }
    
    function getDefaultCode(mode) {
        if (mode === 'split') {
            return {
                html: '<h1>✨ Добро пожаловать в TSandCode!</h1>\n<p>Пиши код в панелях →</p>',
                css: 'body { font-family: system-ui; padding: 20px; }\nh1 { color: #b0b0b0; }',
                js: 'console.log("TSandCode готов к работе!");\ndocument.querySelector("h1").style.color = "#89b4fa";'
            };
        } else {
            return `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TSandCode</title>
    <style>
        body { font-family: system-ui; padding: 20px; }
        h1 { color: #b0b0b0; }
    </style>
</head>
<body>
    <h1>✨ Добро пожаловать в TSandCode!</h1>
    <p>Пиши код в одном окне →</p>
    <script>
        console.log("TSandCode готов к работе!");
        document.querySelector("h1").style.color = "#89b4fa";
    <\/script>
</body>
</html>`;
        }
    }
    
    function loadCode() {
        const savedMode = localStorage.getItem('tsandcode_mode');
        if (savedMode === 'split' || savedMode === 'unified') currentMode = savedMode;
        modeSelect.value = currentMode;
        
        if (currentMode === 'split') {
            const defaultCodes = getDefaultCode('split');
            editors.html.setValue(localStorage.getItem('tsandcode_html') || defaultCodes.html);
            editors.css.setValue(localStorage.getItem('tsandcode_css') || defaultCodes.css);
            editors.js.setValue(localStorage.getItem('tsandcode_js') || defaultCodes.js);
        } else {
            const defaultUnified = getDefaultCode('unified');
            unifiedEditor.setValue(localStorage.getItem('tsandcode_unified') || defaultUnified);
        }
    }
    
    // Рендер редакторов
    function renderSplitMode() {
        container.innerHTML = `
            <div class="panel"><div class="panel-header">📄 HTML</div><textarea id="htmlEditor"></textarea></div>
            <div class="panel"><div class="panel-header">🎨 CSS</div><textarea id="cssEditor"></textarea></div>
            <div class="panel"><div class="panel-header">⚡ JavaScript</div><textarea id="jsEditor"></textarea></div>
            <div class="output-panel"><div class="panel-header">🖥️ Результат</div><iframe id="output"></iframe></div>
        `;
        editors.html = CodeMirror.fromTextArea(document.getElementById('htmlEditor'), {
            lineNumbers: true, mode: "htmlmixed", theme: "material-darker", lineWrapping: true
        });
        editors.css = CodeMirror.fromTextArea(document.getElementById('cssEditor'), {
            lineNumbers: true, mode: "css", theme: "material-darker", lineWrapping: true
        });
        editors.js = CodeMirror.fromTextArea(document.getElementById('jsEditor'), {
            lineNumbers: true, mode: "javascript", theme: "material-darker", lineWrapping: true
        });
    }
    
    function renderUnifiedMode() {
        container.innerHTML = `
            <div class="panel"><div class="panel-header">📄 Единый код (HTML/CSS/JS)</div><textarea id="unifiedEditor"></textarea></div>
            <div class="output-panel"><div class="panel-header">🖥️ Результат</div><iframe id="output"></iframe></div>
        `;
        unifiedEditor = CodeMirror.fromTextArea(document.getElementById('unifiedEditor'), {
            lineNumbers: true, mode: "htmlmixed", theme: "material-darker", lineWinding: true
        });
    }
    
    function render() {
        if (currentMode === 'split') {
            renderSplitMode();
        } else {
            renderUnifiedMode();
        }
        loadCode();
        attachRunEvent();
    }
    
    function attachRunEvent() {
        const output = document.getElementById('output');
        const run = () => {
            if (currentMode === 'split') {
                const html = editors.html.getValue();
                const css = editors.css.getValue();
                const js = editors.js.getValue();
                const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
                const blob = new Blob([doc], { type: 'text/html' });
                output.src = URL.createObjectURL(blob);
            } else {
                const code = unifiedEditor.getValue();
                const blob = new Blob([code], { type: 'text/html' });
                output.src = URL.createObjectURL(blob);
            }
            saveCode();
        };
        runBtn.onclick = run;
        // авторан с задержкой
        let timeout;
        const auto = () => { clearTimeout(timeout); timeout = setTimeout(run, 700); };
        if (currentMode === 'split') {
            editors.html.on('changes', auto);
            editors.css.on('changes', auto);
            editors.js.on('changes', auto);
        } else {
            unifiedEditor.on('changes', auto);
        }
        run();
    }
    
    modeSelect.addEventListener('change', () => {
        currentMode = modeSelect.value;
        render();
    });
    
    render();
</script>
</body>
</html>
