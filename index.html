<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSandCode ❄️ — зимняя песочница кода</title>
    <!-- CodeMirror для подсветки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a1a2e, #06101c);
            min-height: 100vh;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'JetBrains Mono', monospace;
            position: relative;
            overflow-x: hidden;
        }
        /* снежинки */
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .snow i {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
        .app {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
        }
        .toolbar {
            background: rgba(20, 30, 45, 0.7);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid rgba(100, 150, 200, 0.3);
        }
        .logo h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #ffffff, #80b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.7rem;
            color: #8ab3cf;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        select, button {
            background: rgba(10, 20, 35, 0.8);
            border: 1px solid rgba(100, 150, 200, 0.5);
            color: #d0e4ff;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
        }
        button {
            background: rgba(100, 150, 200, 0.2);
            border-color: #80b0ff;
            color: white;
        }
        button:hover, select:hover {
            background: rgba(100, 150, 200, 0.4);
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(128,176,255,0.3);
        }
        .github-link {
            background: rgba(10, 20, 35, 0.8);
            padding: 6px 14px;
            border-radius: 40px;
            text-decoration: none;
            color: #b0d4ff;
            border: 1px solid rgba(100, 150, 200, 0.5);
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .github-link:hover {
            background: #80b0ff20;
            color: white;
        }
        .editor-container {
            flex: 1;
            display: flex;
            gap: 1px;
            background: rgba(30, 40, 55, 0.5);
            padding: 1px;
            overflow: hidden;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(15, 25, 35, 0.7);
            backdrop-filter: blur(8px);
            overflow: hidden;
        }
        .panel-header {
            background: rgba(10, 20, 35, 0.6);
            padding: 8px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(100, 150, 200, 0.3);
            color: #b0d4ff;
        }
        .CodeMirror {
            height: 100% !important;
            background: rgba(10, 20, 35, 0.4) !important;
            font-size: 13px;
        }
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(15, 25, 35, 0.7);
        }
        iframe {
            flex: 1;
            border: none;
            background: white;
        }
        footer {
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            color: #6c8eb0;
            border-top: 1px solid rgba(100, 150, 200, 0.2);
            background: rgba(10, 20, 35, 0.5);
        }
        @media (max-width: 800px) {
            .editor-container {
                flex-direction: column;
            }
            .panel {
                min-height: 30vh;
            }
        }
    </style>
</head>
<body>
<div class="snow" id="snow"></div>
<div class="app">
    <div class="toolbar">
        <div class="logo">
            <h1>❄️ TSandCode</h1>
            <p>зимняя песочница кода — html / css / js</p>
        </div>
        <div class="controls">
            <select id="modeSelect">
                <option value="split">❄️ Раздельный режим (HTML/CSS/JS)</option>
                <option value="unified">📄 Единый режим (всё в одном окне)</option>
            </select>
            <button id="runBtn">▶ Запустить</button>
            <a href="https://github.com/web-pentest" target="_blank" class="github-link">🐙 web-pentest</a>
        </div>
    </div>
    <div id="editorContainer" class="editor-container"></div>
    <footer>🔥 TSandCode — создай свой код в зимней атмосфере | 🐙 <a href="https://github.com/web-pentest" target="_blank" style="color:#b0d4ff;">github.com/web-pentest</a></footer>
</div>

<script>
    let currentMode = 'split';
    let editors = { html: null, css: null, js: null };
    let unifiedEditor = null;
    
    const container = document.getElementById('editorContainer');
    const modeSelect = document.getElementById('modeSelect');
    const runBtn = document.getElementById('runBtn');
    
    function saveCode() {
        if (currentMode === 'split') {
            localStorage.setItem('tsandcode_html', editors.html?.getValue() || '');
            localStorage.setItem('tsandcode_css', editors.css?.getValue() || '');
            localStorage.setItem('tsandcode_js', editors.js?.getValue() || '');
        } else {
            localStorage.setItem('tsandcode_unified', unifiedEditor?.getValue() || '');
        }
        localStorage.setItem('tsandcode_mode', currentMode);
    }
    
    function getDefaultSplit() {
        return {
            html: '<h1>❄️ Добро пожаловать в TSandCode!</h1>\n<p>Пиши код в панелях →</p>',
            css: 'body { font-family: system-ui; padding: 20px; background: #0a1a2e; color: white; }\nh1 { color: #80b0ff; }',
            js: 'console.log("TSandCode готов к работе!");\ndocument.querySelector("h1").style.color = "#b0d4ff";'
        };
    }
    
    function getDefaultUnified() {
        return `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TSandCode</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #0a1a2e; color: white; }
        h1 { color: #80b0ff; }
    </style>
</head>
<body>
    <h1>❄️ Добро пожаловать в TSandCode!</h1>
    <p>Пиши код в одном окне →</p>
    <script>
        console.log("TSandCode готов к работе!");
        document.querySelector("h1").style.color = "#b0d4ff";
    <\/script>
</body>
</html>`;
    }
    
    function loadCode() {
        const savedMode = localStorage.getItem('tsandcode_mode');
        if (savedMode === 'split' || savedMode === 'unified') currentMode = savedMode;
        modeSelect.value = currentMode;
        
        if (currentMode === 'split') {
            const def = getDefaultSplit();
            editors.html.setValue(localStorage.getItem('tsandcode_html') || def.html);
            editors.css.setValue(localStorage.getItem('tsandcode_css') || def.css);
            editors.js.setValue(localStorage.getItem('tsandcode_js') || def.js);
        } else {
            unifiedEditor.setValue(localStorage.getItem('tsandcode_unified') || getDefaultUnified());
        }
    }
    
    function renderSplit() {
        container.innerHTML = `
            <div class="panel"><div class="panel-header">📄 HTML</div><textarea id="htmlEditor"></textarea></div>
            <div class="panel"><div class="panel-header">🎨 CSS</div><textarea id="cssEditor"></textarea></div>
            <div class="panel"><div class="panel-header">⚡ JavaScript</div><textarea id="jsEditor"></textarea></div>
            <div class="output-panel"><div class="panel-header">🖥️ Результат</div><iframe id="output"></iframe></div>
        `;
        editors.html = CodeMirror.fromTextArea(document.getElementById('htmlEditor'), {
            lineNumbers: true, mode: "htmlmixed", theme: "material-darker", lineWrapping: true
        });
        editors.css = CodeMirror.fromTextArea(document.getElementById('cssEditor'), {
            lineNumbers: true, mode: "css", theme: "material-darker", lineWrapping: true
        });
        editors.js = CodeMirror.fromTextArea(document.getElementById('jsEditor'), {
            lineNumbers: true, mode: "javascript", theme: "material-darker", lineWrapping: true
        });
    }
    
    function renderUnified() {
        container.innerHTML = `
            <div class="panel"><div class="panel-header">📄 Единый код (HTML/CSS/JS)</div><textarea id="unifiedEditor"></textarea></div>
            <div class="output-panel"><div class="panel-header">🖥️ Результат</div><iframe id="output"></iframe></div>
        `;
        unifiedEditor = CodeMirror.fromTextArea(document.getElementById('unifiedEditor'), {
            lineNumbers: true, mode: "htmlmixed", theme: "material-darker", lineWrapping: true
        });
    }
    
    function render() {
        if (currentMode === 'split') {
            renderSplit();
        } else {
            renderUnified();
        }
        loadCode();
        attachRun();
    }
    
    function attachRun() {
        const output = document.getElementById('output');
        const run = () => {
            if (currentMode === 'split') {
                const html = editors.html.getValue();
                const css = editors.css.getValue();
                const js = editors.js.getValue();
                const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
                const blob = new Blob([doc], { type: 'text/html' });
                output.src = URL.createObjectURL(blob);
            } else {
                const code = unifiedEditor.getValue();
                const blob = new Blob([code], { type: 'text/html' });
                output.src = URL.createObjectURL(blob);
            }
            saveCode();
        };
        runBtn.onclick = run;
        let timeout;
        const auto = () => { clearTimeout(timeout); timeout = setTimeout(run, 700); };
        if (currentMode === 'split') {
            editors.html.on('changes', auto);
            editors.css.on('changes', auto);
            editors.js.on('changes', auto);
        } else {
            unifiedEditor.on('changes', auto);
        }
        run();
    }
    
    modeSelect.addEventListener('change', () => {
        currentMode = modeSelect.value;
        render();
    });
    
    // снежинки
    function createSnow() {
        const snowDiv = document.getElementById('snow');
        for (let i = 0; i < 80; i++) {
            const flake = document.createElement('i');
            flake.style.left = Math.random() * 100 + '%';
            flake.style.width = flake.style.height = Math.random() * 5 + 2 + 'px';
            flake.style.animationDuration = Math.random() * 4 + 3 + 's';
            flake.style.animationDelay = Math.random() * 5 + 's';
            snowDiv.appendChild(flake);
        }
    }
    createSnow();
    
    render();
</script>
</body>
</html>
