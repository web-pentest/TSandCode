<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSandCode — песочница кода</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c10;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .toolbar {
            background: #131720;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid #2c313c;
        }
        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #e0e0e0, #b0b0b0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.7rem;
            color: #6c727f;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        select, button {
            background: #0f1217;
            border: 1px solid #2c313c;
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
        }
        button {
            background: #b0b0b0;
            color: #0a0c10;
            font-weight: bold;
            border: none;
        }
        button:hover {
            background: #ffffff;
        }
        .github-link {
            background: #0f1217;
            padding: 6px 14px;
            border-radius: 40px;
            text-decoration: none;
            color: #b0b0b0;
            border: 1px solid #2c313c;
            font-size: 0.85rem;
        }
        .editor-container {
            flex: 1;
            display: flex;
            gap: 1px;
            background: #2c313c;
            overflow: hidden;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1e26;
            overflow: hidden;
        }
        .panel-header {
            background: #131720;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: bold;
            border-bottom: 1px solid #2c313c;
        }
        textarea {
            flex: 1;
            background: #1a1e26;
            color: #e0e0e0;
            border: none;
            padding: 12px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1e26;
        }
        iframe {
            flex: 1;
            border: none;
            background: white;
        }
        footer {
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            color: #6c727f;
            border-top: 1px solid #2c313c;
            background: #131720;
        }
        @media (max-width: 800px) {
            .editor-container {
                flex-direction: column;
            }
            .panel {
                min-height: 30vh;
            }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <div class="logo">
        <h1>⚡ TSandCode</h1>
        <p>песочница кода — html / css / js</p>
    </div>
    <div class="controls">
        <select id="modeSelect">
            <option value="split">Раздельный режим (HTML/CSS/JS)</option>
            <option value="unified">Единый режим (всё в одном окне)</option>
        </select>
        <button id="runBtn">▶ Запустить</button>
        <a href="https://github.com/web-pentest" target="_blank" class="github-link">🐙 web-pentest</a>
    </div>
</div>
<div id="editorContainer" class="editor-container"></div>
<footer>🔥 TSandCode — создай свой код прямо в браузере | 🐙 <a href="https://github.com/web-pentest" target="_blank" style="color:#b0b0b0;">github.com/web-pentest</a></footer>

<script>
    let currentMode = 'split';
    
    const container = document.getElementById('editorContainer');
    const modeSelect = document.getElementById('modeSelect');
    const runBtn = document.getElementById('runBtn');
    
    // Сохранение кода
    function saveCode() {
        if (currentMode === 'split') {
            localStorage.setItem('tsandcode_html', document.getElementById('htmlCode')?.value || '');
            localStorage.setItem('tsandcode_css', document.getElementById('cssCode')?.value || '');
            localStorage.setItem('tsandcode_js', document.getElementById('jsCode')?.value || '');
        } else {
            localStorage.setItem('tsandcode_unified', document.getElementById('unifiedCode')?.value || '');
        }
        localStorage.setItem('tsandcode_mode', currentMode);
    }
    
    // Загрузка кода
    function getDefaultSplit() {
        return {
            html: '<h1>✨ Добро пожаловать в TSandCode!</h1>\n<p>Пиши код в панелях →</p>',
            css: 'body { font-family: system-ui; padding: 20px; background: #1a1e26; color: white; }\nh1 { color: #b0b0b0; }',
            js: 'console.log("TSandCode готов к работе!");\ndocument.querySelector("h1").style.color = "#89b4fa";'
        };
    }
    
    function getDefaultUnified() {
        return `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TSandCode</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #1a1e26; color: white; }
        h1 { color: #b0b0b0; }
    </style>
</head>
<body>
    <h1>✨ Добро пожаловать в TSandCode!</h1>
    <p>Пиши код в одном окне →</p>
    <script>
        console.log("TSandCode готов к работе!");
        document.querySelector("h1").style.color = "#89b4fa";
    <\/script>
</body>
</html>`;
    }
    
    function loadCode() {
        const savedMode = localStorage.getItem('tsandcode_mode');
        if (savedMode === 'split' || savedMode === 'unified') currentMode = savedMode;
        modeSelect.value = currentMode;
        
        if (currentMode === 'split') {
            const def = getDefaultSplit();
            document.getElementById('htmlCode').value = localStorage.getItem('tsandcode_html') || def.html;
            document.getElementById('cssCode').value = localStorage.getItem('tsandcode_css') || def.css;
            document.getElementById('jsCode').value = localStorage.getItem('tsandcode_js') || def.js;
        } else {
            document.getElementById('unifiedCode').value = localStorage.getItem('tsandcode_unified') || getDefaultUnified();
        }
    }
    
    // Рендер редакторов
    function renderSplit() {
        container.innerHTML = `
            <div class="panel"><div class="panel-header">📄 HTML</div><textarea id="htmlCode" placeholder="<h1>Привет, мир!</h1>"></textarea></div>
            <div class="panel"><div class="panel-header">🎨 CSS</div><textarea id="cssCode" placeholder="body { background: #f0f0f0; }"></textarea></div>
            <div class="panel"><div class="panel-header">⚡ JavaScript</div><textarea id="jsCode" placeholder="console.log('Привет!');"></textarea></div>
            <div class="output-panel"><div class="panel-header">🖥️ Результат</div><iframe id="output"></iframe></div>
        `;
    }
    
    function renderUnified() {
        container.innerHTML = `
            <div class="panel"><div class="panel-header">📄 Единый код (HTML/CSS/JS)</div><textarea id="unifiedCode" style="font-family: monospace; font-size: 14px;"></textarea></div>
            <div class="output-panel"><div class="panel-header">🖥️ Результат</div><iframe id="output"></iframe></div>
        `;
    }
    
    function render() {
        if (currentMode === 'split') {
            renderSplit();
        } else {
            renderUnified();
        }
        loadCode();
        attachRun();
    }
    
    function attachRun() {
        const output = document.getElementById('output');
        
        function run() {
            if (currentMode === 'split') {
                const html = document.getElementById('htmlCode').value;
                const css = document.getElementById('cssCode').value;
                const js = document.getElementById('jsCode').value;
                const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
                const blob = new Blob([doc], { type: 'text/html' });
                output.src = URL.createObjectURL(blob);
            } else {
                const code = document.getElementById('unifiedCode').value;
                const blob = new Blob([code], { type: 'text/html' });
                output.src = URL.createObjectURL(blob);
            }
            saveCode();
        }
        
        runBtn.onclick = run;
        
        // Автообновление
        let timeout;
        function autoRun() {
            clearTimeout(timeout);
            timeout = setTimeout(run, 500);
        }
        
        if (currentMode === 'split') {
            document.getElementById('htmlCode').addEventListener('input', autoRun);
            document.getElementById('cssCode').addEventListener('input', autoRun);
            document.getElementById('jsCode').addEventListener('input', autoRun);
        } else {
            document.getElementById('unifiedCode').addEventListener('input', autoRun);
        }
        
        run();
    }
    
    modeSelect.addEventListener('change', () => {
        currentMode = modeSelect.value;
        render();
    });
    
    render();
</script>
</body>
</html>
